name: Build & Test (macOS)

# Builds Clicky and runs the unit-test suite on a GitHub-hosted macOS runner.
# This verifies the code compiles and the pure-logic tests pass WITHOUT a local
# Xcode install — the runner already has it.
#
# What this CANNOT verify (intrinsically needs a real interactive Mac with TCC
# grants and a person at the keyboard): the --confirmation-panel-spike, pointing
# accuracy, real synthetic clicks/typing, multi-monitor behaviour, and the
# permission flows. Those remain manual.
#
# Note: running xcodebuild here does NOT violate the repo's "no terminal
# xcodebuild" rule — that rule protects the developer's local TCC permission
# grants. A throwaway CI runner has none to invalidate.
#
# Signing: macOS apps build and run unsigned via ad-hoc "sign to run locally"
# (CODE_SIGN_IDENTITY=-). CODE_SIGNING_ALLOWED=NO is an iOS-flavoured flag that
# prevents a runnable host bundle and breaks the hosted unit-test target.

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: macos-15
    timeout-minutes: 30
    env:
      PROJECT: leanring-buddy.xcodeproj
      SCHEME: leanring-buddy
      DESTINATION: 'platform=macOS,arch=arm64'
      SIGNING_FLAGS: >-
        CODE_SIGN_IDENTITY=-
        CODE_SIGNING_REQUIRED=NO
        CODE_SIGNING_ALLOWED=YES
        DEVELOPMENT_TEAM=
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show toolchain
        run: |
          xcodebuild -version
          swift --version

      - name: Resolve Swift Package dependencies (Sparkle, PostHog)
        run: xcodebuild -resolvePackageDependencies -project "$PROJECT" -scheme "$SCHEME"

      - name: Build app (compile check)
        run: |
          set -o pipefail
          xcodebuild build \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -destination "$DESTINATION" \
            $SIGNING_FLAGS

      - name: Run unit tests
        run: |
          set -o pipefail
          # build-for-testing + test-without-building with a dedicated DerivedData
          # path. build-for-testing builds the host app and test bundle in a single
          # graph and emits an .xctestrun, which resolves the hosted-test-target host
          # that a plain `xcodebuild test` would not schedule on CI.
          xcodebuild build-for-testing \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -destination 'platform=macOS' \
            -derivedDataPath ./DerivedDataTest \
            $SIGNING_FLAGS
          xcodebuild test-without-building \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -destination 'platform=macOS' \
            -derivedDataPath ./DerivedDataTest \
            $SIGNING_FLAGS
